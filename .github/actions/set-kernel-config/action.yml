name: Set Kernel Config
description: Patch gki_defconfig directly (add or modify entries)

inputs:
  config_list:
    required: true
    description: "Kernel config lines"

runs:
  using: composite
  steps:
  - name: Patch gki_defconfig
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail

      DEFCONFIG="arch/arm64/configs/gki_defconfig"
      CONFIG_LIST="${{ inputs.config_list }}"

      if [ ! -f "$DEFCONFIG" ]; then
        echo "ERROR: gki_defconfig not found"
        exit 1
      fi

      apply_line() {
        local line="$1"
        line="$(echo "$line" | xargs)"

        # skip empty/comments
        [[ -z "$line" || "$line" == \#* ]] && return

        local key value
        if [[ "$line" == *"="* ]]; then
          key="${line%%=*}"
          value="${line#*=}"
        else
          key="$line"
          value="y"
        fi

        echo "Processing: $key=$value"

        if [[ "$value" == "n" ]]; then
          replacement="# $key is not set"

          if grep -q "^$key=" "$DEFCONFIG"; then
            sed -i "s|^$key=.*|$replacement|g" "$DEFCONFIG"
          elif grep -q "^# $key is not set" "$DEFCONFIG"; then
            :
          else
            echo "$replacement" >> "$DEFCONFIG"
          fi
        else
          replacement="$key=$value"

          if grep -q "^$key=" "$DEFCONFIG"; then
            sed -i "s|^$key=.*|$replacement|g" "$DEFCONFIG"
          elif grep -q "^# $key is not set" "$DEFCONFIG"; then
            sed -i "s|^# $key is not set|$replacement|g" "$DEFCONFIG"
          else
            echo "$replacement" >> "$DEFCONFIG"
          fi
        fi
      }

      while IFS= read -r line || [ -n "$line" ]; do
        apply_line "$line"
      done <<< "$CONFIG_LIST"