name: Apply ZeroMount VFS patch set
description: Apply enhanced SUSFS, ZeroMount VFS, and WKSU safety patches to Android 13 GKI 5.15
inputs:
  version:
    required: true
  kernel_version:
    required: true
  android_version:
    required: true
runs:
  using: composite
  steps:
    - name: Validate target and apply patches
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.version }}" != "android13-5.15" ]]; then
          echo "ZeroMount overlay only supports android13-5.15" >&2
          exit 1
        fi

        ROOT="${GITHUB_WORKSPACE}"
        PATCH_DIR="${ROOT}/patches/zeromount"
        if [[ -d "${ROOT}/kernel/common" ]]; then
          KERNEL_DIR="${ROOT}/kernel/common"
        elif [[ -d "${ROOT}/common" ]]; then
          KERNEL_DIR="${ROOT}/common"
        else
          echo "Could not locate Android common kernel source tree" >&2
          find "${ROOT}" -maxdepth 3 -type d -name common -print || true
          exit 1
        fi

        echo "Kernel source: ${KERNEL_DIR}"
        echo "=== SUSFS source validation ==="
        KSU_TREE="${ROOT}/kernel/KernelSU-Next/kernel"

        test -d "${KSU_TREE}" || {
          echo "ERROR: KernelSU-Next kernel tree missing" >&2
          exit 1
        }

        grep -RqsE '^[[:space:]]*config[[:space:]]+KSU_SUSFS([[:space:]]|$)' "${KSU_TREE}" || {
          echo "ERROR: KSU_SUSFS missing from KernelSU-Next Kconfig" >&2
          exit 1
        }

        grep -n "susfs" "${KERNEL_DIR}/fs/Makefile" || {
          echo "ERROR: SUSFS Makefile entry missing from fs/Makefile" >&2
          exit 1
        }

        test -f "${KERNEL_DIR}/fs/susfs.c" || {
          echo "ERROR: fs/susfs.c missing" >&2
          exit 1
        }

        test -f "${KERNEL_DIR}/fs/namei.c"
        test -f "${KERNEL_DIR}/fs/Kconfig"
        find "${KERNEL_DIR}/kernel" -maxdepth 2 -type f | grep -E "super|ksu" | head -50 || true

        apply_one() {
          local patch_file="$1"
          echo "Checking $(basename "${patch_file}")"
          if patch -d "${KERNEL_DIR}" -p1 --dry-run --forward --batch < "${patch_file}"; then
            patch -d "${KERNEL_DIR}" -p1 --forward --batch < "${patch_file}"
          else
            echo "Patch does not apply cleanly: ${patch_file}" >&2
            mkdir -p "${ROOT}/patch-rejects/zeromount"
            cp "${patch_file}" "${ROOT}/patch-rejects/zeromount/"
            patch -d "${KERNEL_DIR}" -p1 --forward --batch --reject-file="${ROOT}/patch-rejects/zeromount/$(basename "${patch_file}").rej" < "${patch_file}" || true
            exit 1
          fi
        }

        # Disabled: upstream SUSFS already conflicts with enhanced SUSFS overlay
        # apply_one "${PATCH_DIR}/51_enhanced_susfs-android13-5.15.patch"
        apply_one "${PATCH_DIR}/60_zeromount-android13-5.15.patch"
        # Disabled: kernel/supercalls.c is absent in current KSU/WKSU tree
        # apply_one "${PATCH_DIR}/70_ksu_safety-wksu-5.15.patch"

        CONFIGS=(
          CONFIG_ZEROMOUNT=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_HIDDEN_NAME=y
          CONFIG_KSU_SUSFS_HARDENED=y
        )

        DEFCONFIG="${KERNEL_DIR}/arch/arm64/configs/gki_defconfig"
        for cfg in "${CONFIGS[@]}"; do
          key="${cfg%%=*}"
          sed -i "/^${key}=/d;/^# ${key} is not set$/d" "${DEFCONFIG}"
          echo "${cfg}" >> "${DEFCONFIG}"
          sed -i "/^${key}=/d;/^# ${key} is not set$/d" "${ROOT}/wild_gki.fragment" 2>/dev/null || true
          echo "${cfg}" >> "${ROOT}/wild_gki.fragment"
        done

        echo "=== ZeroMount validation ==="
        grep -n '^CONFIG_ZEROMOUNT=y$' "${DEFCONFIG}" || true
        grep -n 'zeromount' "${KERNEL_DIR}/fs/Makefile" || true
        ls -l "${KERNEL_DIR}/fs/zeromount.c" "${KERNEL_DIR}/include/linux/zeromount.h" || true
        echo "ZeroMount patch set applied successfully"
        exit 0
